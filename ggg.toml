## * Godot Goodie Grabber configuration file
## * https://godotneers.github.io/ggg/docs/reference/configuration/
## *
## * If this is not installed on your system, you may do so with the following
## * instructions
## *
## * On Linux and macOS:
## * curl -fsSL https://github.com/godotneers/ggg/releases/latest/download/ggg-installer.sh | sh
## *
## * On Windows via Powershell[1]:
## * irm https://github.com/godotneers/ggg/releases/latest/download/ggg-installer.ps1 | iex
## *
## * [1] Note that the legacy Command Prompt shell is not a supported method.
## *
## * Updates may be performed with the `ggg-update` command.
## *
## * Additional information may be found here
## * https://godotneers.github.io/ggg/docs/installation/
## *
## *
## * Upon entering `ggg` into your shell without passing additional arguments, 
## * you may receive the following output:
## * 
## * A project manager for Godot games
## * 
## * Usage: ggg.exe <COMMAND>
## * 
## * Commands:
## *   sync    Resolve and install all dependencies, download Godot if needed
## *   edit    Open the project in the pinned Godot editor
## *   run     Run Godot against the project
## *   add     Add a new dependency
## *   search  Search the Godot Asset Library
## *   update  Check for updates to Godot Asset Library dependencies
## *   remove  Remove a dependency
## *   deps    List all dependencies declared in ggg.toml
## *   diff    Show local changes to ggg-owned files
## *   ls-dep  List the raw contents of a dependency's cache entry
## *   help    Print this message or the help of the given subcommand(s)
## *
## * The sync command is particularly important.
## *
## *
## * Here is a full example of what a configuration file may look like
## * https://godotneers.github.io/ggg/docs/reference/configuration#full-example
## *
## * [project]
## * godot = "4.3-stable"
## * export_templates = true   # download and install export templates alongside the engine
## * 
## * [sync]
## * # Godot rewrites these files on every project open; skip conflict detection for them
## * force_overwrite = ["**/*.import", "**/*.uid"]
## * 
## * # Git dep - single mapping, exclude the bundled examples
## * [[dependency]]
## * name    = "gut"
## * git     = "https://github.com/bitwes/Gut.git"
## * rev     = "v9.3.0"
## * map     = [{ from = "addons/gut" }]
## * exclude = ["addons/gut/examples"]
## * 
## * # Git dep - multiple mappings: install the addon and also grab the examples
## * [[dependency]]
## * name = "phantom-camera"
## * git  = "https://github.com/ramokz/phantom-camera.git"
## * rev  = "v0.8"
## * map  = [
## *     { from = "addons/phantom_camera" },
## *     { from = "examples/", to = "examples/phantom_camera" },
## * ]
## * 
## * # Archive dep - strip the top-level wrapper directory, install just the addon
## * [[dependency]]
## * name             = "debug-draw"
## * url              = "https://github.com/example/debug_draw_3d/releases/download/v1.0/debug_draw_3d.zip"
## * sha256           = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
## * strip_components = 1
## * map              = [{ from = "addons/debug_draw_3d" }]
## * 
## * # Git dep - no map, copies the entire repository into the project root
## * [[dependency]]
## * name = "dialogue-manager"
## * git  = "https://github.com/nathanhoad/godot_dialogue_manager.git"
## * rev  = "v2.34.0"

## It's recommended to manage your Godot development environment through Godot
## Goodie Grabber. This helps to keep everyone in sync with the Godot version
## that has been agreed upon by the team and minimizes confusion stemming from
## bugs caused by being on the wrong version.
##
## In addition, it sidesteps the issue of Steam automatically updating the
## Godot install and potentially breaking the game or the fact Godot on Steam
## does not support the C# programming language - particularly important to
## have since not all dependencies are either GDScript or GDExtension based.
##
## If you are unsatisfied with where `ggg` installs Godot and the respective
## export templates, create a symbolic link at the location where these would
## normally be at and have it target the drive you wish to put it in.
[project]
godot = "4.7-stable-mono" # Which version of Godot does it use.
export_templates = true # Automatically install export templates if not installed.

## https://godotneers.github.io/ggg/docs/reference/commands/sync#automatically-overwriting-engine-managed-files
[sync]
force_overwrite = ["**/*.import", "**/*.uid"]

## Software dependencies
##
## This section lists external or third party assets and/or code made by other
## developers or artists that YOUR game is dependent on.
##
## You should stick with Zip releases with SHA256 hashes specified for
## validating if the dependency hasn't been tampered with and/or sourcing it
## straight from the Git repository with a revision tag.
##
## Using the ID from the Godot Asset Library (not to be confused with the
## newer Asset Store) is not advisable. It is impossible to pin to a specific
## version or to validate the asset hasn't been tampered with a virus.
##
## Examples why one should 📌 pin their versions.
## https://securitylabs.datadoghq.com/articles/node-ipc-npm-malware-analysis/
## https://github.com/advisories/GHSA-97m3-w2cp-4xx6
## https://tanstack.com/blog/npm-supply-chain-compromise-postmortem
##
## Do note this issue is not exclusive to any particular programming languages.

